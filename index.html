<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo List</title>
    <!-- Pico CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"
    />
    <!-- custom CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header>
      <h1>📋 Simple Todo List</h1>
    </header>

    <main class="lists">
      <!-- incomplete tasks -->
      <section>
        <header>
          <h2>💤 Incomplete Tasks</h2>
          <span class="badge" id="incomplete-count"></span>
        </header>

        <p id="incomplete-empty">
          <em>Nothing here... create a task to get started.</em>
        </p>

        <ul class="list" id="incomplete-tasks">
          <!-- <li class="list-item">
            <div class="task">
              <input type="radio" name="" id="" />
              <div class="task-data">
                <h3>Take out trash</h3>
                <div class="task-metadata">
                  <span>Home</span>
                  <span>Due on 2025/08/22</span>
                </div>
              </div>
            </div>
          </li> -->
        </ul>
      </section>

      <!-- TODO: completed tasks -->
    </main>

    <footer>
      <p>Simple Todo List &copy; 2025</p>
      <small>Developed by Theo Snyman</small>
    </footer>

    <!-- task creator -->
    <dialog id="task-creator">
      <article>
        <header>
          <button
            aria-label="Close"
            rel="prev"
            data-role="close-task-creator"
          ></button>
          <p>
            <strong>🎯 Task Creator</strong>
          </p>
        </header>

        <form>
          <label>
            Description
            <input
              name="task-description"
              id="task-description"
              autocomplete="off"
              aria-describedby="task-description-helper"
              required
            />
            <small id="task-description-helper"
              >Please describe your task.</small
            >
          </label>

          <select
            name="task-category"
            aria-label="Categorize your task..."
            id="task-category"
          >
            <option value="" selected disabled>Categorize your task...</option>
            <option value="Work">Work</option>
            <option value="Home">Home</option>
            <option value="Personal">Personal</option>
            <option value="Learning">Learning</option>
            <option value="Other">Other</option>
          </select>

          <label>
            Due Date
            <input type="date" name="task-due-date" id="task-due-date" />
          </label>
        </form>

        <footer>
          <button data-role="create-task">Create Task</button>
        </footer>
      </article>
    </dialog>

    <!-- open task creator -->
    <button id="open-task-creator" data-role="open-task-creator">
      <ion-icon name="add-outline" data-role="open-task-creator"></ion-icon>
    </button>

    <!-- ionicons -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <!-- custom JS -->
    <script src="./assets/js/app.js" type="module"></script>
  </body>
</html>
